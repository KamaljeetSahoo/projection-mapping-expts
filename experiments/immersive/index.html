<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Projection Lab" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  <title>Immersive Room Transform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #help-overlay {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.6);
      font-family: 'SF Mono', monospace; font-size: 14px;
      padding: 12px 16px; border-radius: 8px; line-height: 1.8;
      pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    }
    #help-overlay.visible { opacity: 1; }
    #mode-label {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
      font-family: 'SF Mono', monospace; font-size: 15px;
      padding: 6px 16px; border-radius: 20px;
      pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="help-overlay">
    Space — next scene<br>
    1/2/3 — select scene<br>
    F — fullscreen<br>
    H — toggle help
  </div>
  <div id="mode-label"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Projection Lab" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  <title>Interactive Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #050508;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .dashboard {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      grid-template-rows: 1.2fr 1fr 0.5fr;
      gap: 20px;
      padding: 30px;
    }

    .widget {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    .widget-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 14px;
      font-weight: 500;
    }

    /* Clock - center top, large */
    .clock-widget {
      grid-column: 2;
      grid-row: 1;
      align-items: center;
      justify-content: center;
    }

    .clock-analog {
      width: 260px; height: 260px;
      position: relative;
    }
    .clock-analog svg { width: 100%; height: 100%; }
    .clock-digital {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3.5rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.9);
    }
    .clock-seconds {
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.5);
      vertical-align: super;
      margin-left: 4px;
    }
    .clock-ampm {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.5);
      margin-left: 8px;
    }

    /* Weather - left top */
    .weather-widget { grid-column: 1; grid-row: 1; }
    .weather-current {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .weather-icon { font-size: 3.5rem; }
    .weather-temp {
      font-size: 3.5rem;
      font-weight: 400;
      line-height: 1;
    }
    .weather-temp-unit {
      font-size: 1.5rem;
      color: rgba(255, 255, 255, 0.55);
      vertical-align: super;
    }
    .weather-desc {
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
    }
    .weather-details {
      display: flex;
      gap: 20px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 20px;
    }
    .weather-forecast {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }
    .forecast-day {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .forecast-day .day-name {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .forecast-day .day-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .forecast-day .day-temp {
      font-size: 1.1rem;
      font-weight: 500;
    }
    .forecast-day .day-low {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.45);
    }
    .weather-location {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 10px;
    }

    /* Calendar - right top */
    .calendar-widget { grid-column: 3; grid-row: 1; }
    .calendar-date-large {
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .calendar-year {
      font-size: 1.15rem;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 20px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-top: auto;
    }
    .calendar-grid .cal-header {
      font-size: 0.9rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      padding: 5px 0;
      text-transform: uppercase;
      font-weight: 500;
    }
    .calendar-grid .cal-day {
      font-size: 1rem;
      text-align: center;
      padding: 6px 0;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 400;
    }
    .calendar-grid .cal-day.today {
      background: rgba(100, 180, 255, 0.2);
      color: #64b4ff;
      font-weight: 600;
    }
    .calendar-grid .cal-day.empty { visibility: hidden; }

    /* System Stats - left middle */
    .stats-widget { grid-column: 1; grid-row: 2; }
    .stats-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      justify-content: center;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-ring {
      width: 60px; height: 60px;
      position: relative;
      flex-shrink: 0;
    }
    .stat-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .stat-ring .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 4;
    }
    .stat-ring .ring-fill {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease;
    }
    .stat-ring .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255, 255, 255, 0.7);
    }
    .stat-info .stat-name {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .stat-info .stat-value {
      font-size: 1.1rem;
      font-weight: 400;
    }

    /* Now Playing - right middle */
    .nowplaying-widget {
      grid-column: 3;
      grid-row: 2;
      justify-content: center;
    }
    .np-content {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }
    .np-art {
      width: 80px; height: 80px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }
    .np-info { flex: 1; }
    .np-title {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .np-artist {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
    }
    .np-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: rgba(255, 255, 255, 0.35);
      font-size: 1.1rem;
    }
    .np-bars {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 20px;
      margin-bottom: 10px;
    }
    .np-bar {
      width: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    /* Center middle - empty or expandable */
    .center-spacer {
      grid-column: 2;
      grid-row: 2;
      background: transparent;
      border: none;
    }

    /* Quote - bottom full width */
    .quote-widget {
      grid-column: 1 / -1;
      grid-row: 3;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .quote-text {
      font-size: 1.4rem;
      font-weight: 400;
      font-style: italic;
      color: rgba(255, 255, 255, 0.55);
      max-width: 900px;
      line-height: 1.6;
      transition: opacity 0.8s ease;
    }
    .quote-author {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 10px;
      font-style: normal;
    }

    /* Help overlay */
    #help-overlay {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: rgba(255, 255, 255, 0.6);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 5;
    }
    #help-overlay.visible { opacity: 1; }

    /* ------- Landscape phones & small tablets ------- */
    @media (max-width: 900px) {
      .dashboard { gap: 12px; padding: 14px; }
      .widget { padding: 14px; border-radius: 12px; }
      .widget-label { font-size: 0.8rem; margin-bottom: 8px; }
      .clock-analog { width: min(200px, 30vh); height: min(200px, 30vh); }
      .clock-digital { font-size: clamp(1.6rem, 4.5vw, 2.4rem); margin-top: 10px; }
      .clock-seconds { font-size: 1rem; }
      .clock-ampm { font-size: 0.9rem; }
      .weather-temp { font-size: clamp(1.8rem, 6vw, 2.6rem); }
      .weather-icon { font-size: 2.4rem; }
      .weather-temp-unit { font-size: 1.1rem; }
      .weather-desc { font-size: 0.95rem; }
      .weather-details { font-size: 0.8rem; gap: 10px; margin-bottom: 10px; }
      .weather-forecast { gap: 8px; }
      .forecast-day { padding: 6px 3px; }
      .forecast-day .day-name { font-size: 0.7rem; }
      .forecast-day .day-icon { font-size: 1rem; }
      .forecast-day .day-temp { font-size: 0.85rem; }
      .forecast-day .day-low { font-size: 0.75rem; }
      .calendar-date-large { font-size: 1.3rem; }
      .calendar-year { font-size: 0.95rem; margin-bottom: 10px; }
      .calendar-grid .cal-header { font-size: 0.7rem; padding: 2px 0; }
      .calendar-grid .cal-day { font-size: 0.8rem; padding: 4px 0; }
      .stat-ring { width: 46px; height: 46px; }
      .stat-ring .ring-label { font-size: 0.7rem; }
      .stat-info .stat-name { font-size: 0.8rem; }
      .stat-info .stat-value { font-size: 0.9rem; }
      .stats-grid { gap: 10px; }
      .np-art { width: 52px; height: 52px; font-size: 1.4rem; }
      .np-title { font-size: 1rem; }
      .np-artist { font-size: 0.85rem; }
      .np-idle { font-size: 0.85rem; }
      .quote-text { font-size: 1rem; line-height: 1.55; }
      .quote-author { font-size: 0.85rem; }
    }

    /* ------- Portrait phones: stack into a single column ------- */
    @media (max-width: 600px) {
      html, body { overflow-y: auto; overflow-x: hidden; overscroll-behavior-y: contain; }
      .dashboard {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: auto;
        min-height: 100dvh;
        padding:
          max(14px, env(safe-area-inset-top))
          14px
          calc(84px + env(safe-area-inset-bottom));
        gap: 10px;
      }
      .widget { width: 100%; min-height: 0; }
      .center-spacer { display: none; }
      /* Logical reading order on phone */
      .clock-widget     { order: 1; }
      .weather-widget   { order: 2; }
      .calendar-widget  { order: 3; }
      .stats-widget     { order: 4; }
      .nowplaying-widget{ order: 5; }
      .quote-widget     { order: 6; }

      .clock-analog { width: min(190px, 50vw); height: min(190px, 50vw); }
      .clock-digital { font-size: clamp(1.8rem, 9vw, 2.4rem); margin-top: 10px; }
      .clock-seconds { font-size: 1rem; }
      .weather-current { margin-bottom: 10px; gap: 12px; }
      .weather-forecast { gap: 6px; }
      .calendar-grid .cal-day { padding: 6px 0; font-size: 0.85rem; }
      .calendar-grid .cal-header { font-size: 0.72rem; }
      .stats-grid { flex-direction: row; flex-wrap: wrap; gap: 12px; justify-content: flex-start; }
      .stat-item { flex: 1 1 45%; min-width: 140px; }
      .quote-text { font-size: 0.95rem; line-height: 1.6; }
      .quote-widget { padding: 18px; }
      #help-overlay { display: none; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Weather -->
    <div class="widget weather-widget">
      <div class="widget-label">Weather</div>
      <div id="weather-content">
        <div class="weather-desc">Loading...</div>
      </div>
    </div>

    <!-- Clock -->
    <div class="widget clock-widget">
      <div class="clock-analog">
        <svg viewBox="0 0 200 200" id="clock-svg">
          <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
          <!-- Hour markers -->
          <g id="clock-markers"></g>
          <!-- Hands -->
          <line id="hand-hour" x1="100" y1="100" x2="100" y2="50" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
          <line id="hand-minute" x1="100" y1="100" x2="100" y2="30" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
          <line id="hand-second" x1="100" y1="100" x2="100" y2="25" stroke="rgba(100,180,255,0.6)" stroke-width="1" stroke-linecap="round"/>
          <circle cx="100" cy="100" r="3" fill="rgba(100,180,255,0.8)"/>
        </svg>
      </div>
      <div class="clock-digital" id="clock-digital"></div>
    </div>

    <!-- Calendar -->
    <div class="widget calendar-widget">
      <div class="widget-label">Calendar</div>
      <div class="calendar-date-large" id="cal-date"></div>
      <div class="calendar-year" id="cal-year"></div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>

    <!-- System Stats -->
    <div class="widget stats-widget">
      <div class="widget-label">Network</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Center spacer -->
    <div class="center-spacer"></div>

    <!-- Now Playing -->
    <div class="widget nowplaying-widget">
      <div class="widget-label">Now Playing</div>
      <div id="np-content"></div>
    </div>

    <!-- Quote -->
    <div class="widget quote-widget">
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-author" id="quote-author"></div>
    </div>
  </div>

  <div id="help-overlay">
    F — fullscreen<br>
    T — toggle 12h/24h<br>
    H — toggle help
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Projection Lab" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  <title>Motion-Reactive Wall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #start-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10; transition: opacity 0.5s ease;
    }
    #start-overlay.hidden { opacity: 0; pointer-events: none; }
    #start-overlay h1 {
      font-family: 'SF Mono', monospace;
      font-size: 1.5rem; font-weight: 300; color: #fff;
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    #start-overlay p {
      font-family: 'SF Mono', monospace;
      font-size: 0.9rem; color: #666; margin-bottom: 2.5rem;
    }
    #start-btn {
      font-family: 'SF Mono', monospace;
      font-size: 0.9rem; padding: 14px 40px;
      background: transparent; border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 30px; cursor: pointer;
      letter-spacing: 0.15em; text-transform: uppercase;
      transition: all 0.3s ease;
    }
    #start-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); }
    #start-home {
      margin-top: 1.2rem;
      font-family: 'SF Mono', monospace;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      background: transparent; border: none; cursor: pointer;
      text-decoration: underline;
      padding: 8px 12px;
      touch-action: manipulation;
    }
    #start-home:hover { color: rgba(255, 255, 255, 0.7); }
    #error-msg {
      font-family: 'SF Mono', monospace;
      font-size: 0.8rem; color: #e55; margin-top: 1.5rem; display: none;
    }
    #help-overlay {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.6);
      font-family: 'SF Mono', monospace; font-size: 14px;
      padding: 12px 16px; border-radius: 8px; line-height: 1.8;
      pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 5;
    }
    #help-overlay.visible { opacity: 1; }
    #mode-label {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
      font-family: 'SF Mono', monospace; font-size: 15px;
      padding: 6px 16px; border-radius: 20px;
      pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
      letter-spacing: 0.1em; text-transform: uppercase; z-index: 5;
    }
  </style>
</head>
<body>
  <div id="start-overlay">
    <h1>Motion-Reactive Wall</h1>
    <p>Camera access required to detect movement</p>
    <button id="start-btn">Start Camera</button>
    <div id="error-msg"></div>
    <button id="start-home" type="button">← Back to home</button>
  </div>
  <canvas id="canvas"></canvas>
  <div id="help-overlay">
    Space — next mode<br>
    1/2/3 — select mode<br>
    F — fullscreen<br>
    H — toggle help
  </div>
  <div id="mode-label"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>

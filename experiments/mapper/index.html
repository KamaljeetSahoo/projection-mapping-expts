<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Projection Lab" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  <title>Projection Mapper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
    canvas { display: block; width: 100%; height: 100%; position: absolute; inset: 0; }

    #ui-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    #ui-layer.hidden { opacity: 0; }
    #ui-layer > * { pointer-events: auto; }

    /* Top toolbar */
    .toolbar {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 4px;
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 6px 10px;
      backdrop-filter: blur(12px);
      max-width: calc(100vw - 32px);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .toolbar button, .toolbar select {
      font-family: 'Inter', sans-serif; font-size: 13px;
      background: transparent; border: 1px solid transparent;
      color: rgba(255,255,255,0.6); padding: 6px 12px;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .toolbar button:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .toolbar button.active { background: rgba(80,160,255,0.2); color: #5af; border-color: rgba(80,160,255,0.3); }
    .toolbar .sep { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px; }
    .toolbar select {
      background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);
      appearance: none; padding-right: 20px;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 6px center;
    }
    .toolbar select option { background: #1a1a20; color: #ccc; }
    .toolbar input[type="color"] {
      width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; cursor: pointer; background: transparent; padding: 1px;
    }
    .toolbar input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .toolbar input[type="color"]::-webkit-color-swatch { border-radius: 4px; border: none; }

    /* Properties panel */
    .props-panel {
      position: absolute; right: 16px; top: 80px;
      width: 220px;
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 16px;
      backdrop-filter: blur(12px);
      display: none;
      color: rgba(255,255,255,0.7); font-size: 13px;
    }
    .props-panel.visible { display: block; }
    .props-panel h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35); margin-bottom: 12px; font-weight: 500;
    }
    .prop-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .prop-row label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .prop-row input[type="range"] { width: 100px; accent-color: #5af; }
    .prop-row input[type="color"] {
      width: 24px; height: 24px; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; cursor: pointer; background: transparent; padding: 0;
    }
    .prop-row select {
      font-family: 'Inter', sans-serif; font-size: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #ccc; padding: 4px 8px; border-radius: 6px;
    }
    .prop-row select option { background: #1a1a20; }
    .prop-btn {
      width: 100%; padding: 8px; margin-top: 8px;
      background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.2);
      color: rgba(255,100,100,0.8); border-radius: 8px; cursor: pointer;
      font-size: 12px; font-family: 'Inter', sans-serif;
    }
    .prop-btn:hover { background: rgba(255,60,60,0.25); }

    /* Status bar */
    .status {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(20, 20, 25, 0.7);
      border-radius: 8px; padding: 6px 14px;
      font-size: 12px; color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui-layer">
    <div class="toolbar">
      <button id="btn-home" title="Home" aria-label="Home">⌂</button>
      <div class="sep"></div>
      <button id="tool-draw" class="active" title="Draw Shape (D)">Draw</button>
      <button id="tool-select" title="Select (V)">Select</button>
      <div class="sep"></div>
      <select id="fill-type" title="Fill Type">
        <option value="none">No Fill</option>
        <option value="solid">Solid</option>
        <option value="gradient">Gradient</option>
        <option value="mesh">Mesh</option>
        <option value="glow">Glow</option>
      </select>
      <input type="color" id="stroke-color" value="#ffffff" title="Stroke Color">
      <input type="color" id="fill-color" value="#ff4488" title="Fill Color">
      <div class="sep"></div>
      <button id="btn-save" title="Save (Ctrl+S)">Save</button>
      <button id="btn-export" title="Export">Export</button>
      <button id="btn-import" title="Import">Import</button>
      <div class="sep"></div>
      <button id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
    </div>

    <div class="props-panel" id="props-panel">
      <h3>Shape Properties</h3>
      <div class="prop-row">
        <label>Stroke</label>
        <input type="color" id="prop-stroke-color" value="#ffffff">
      </div>
      <div class="prop-row">
        <label>Width</label>
        <input type="range" id="prop-stroke-width" min="1" max="10" value="2" step="0.5">
      </div>
      <div class="prop-row">
        <label>Opacity</label>
        <input type="range" id="prop-opacity" min="0" max="1" value="0.8" step="0.05">
      </div>
      <div class="prop-row">
        <label>Fill</label>
        <select id="prop-fill-type">
          <option value="none">None</option>
          <option value="solid">Solid</option>
          <option value="gradient">Gradient</option>
          <option value="mesh">Mesh</option>
          <option value="glow">Glow</option>
        </select>
      </div>
      <div class="prop-row">
        <label>Fill Color</label>
        <input type="color" id="prop-fill-color" value="#ff4488">
      </div>
      <div class="prop-row">
        <label>Color 2</label>
        <input type="color" id="prop-fill-color2" value="#4488ff">
      </div>
      <div class="prop-row">
        <label>Mesh Density</label>
        <input type="range" id="prop-mesh-density" min="3" max="20" value="8" step="1">
      </div>
      <div class="prop-row">
        <label>Glow Speed</label>
        <input type="range" id="prop-glow-speed" min="0.2" max="5" value="1" step="0.1">
      </div>
      <button class="prop-btn" id="btn-delete">Delete Shape</button>
    </div>

    <div class="status" id="status">Click to place points — double-click to close shape</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>

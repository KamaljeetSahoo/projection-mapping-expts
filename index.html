<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projection Mapping Experiments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      color: #fff;
    }
    .experiments {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 500px;
      padding: 0 2rem;
    }
    a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #ccc;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    a:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      transform: translateX(4px);
    }
    .num {
      font-size: 0.75rem;
      color: #555;
      min-width: 1.5rem;
    }
    .label { font-size: 1rem; font-weight: 400; }
    .tag {
      margin-left: auto;
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .tag.ready { background: rgba(80, 200, 120, 0.15); color: #50c878; }
    .tag.soon { background: rgba(255, 200, 50, 0.1); color: #666; }
  </style>
</head>
<body>
  <h1>Projection Lab</h1>
  <div class="experiments">
    <a href="./experiments/art/">
      <span class="num">01</span>
      <span class="label">Generative Art Canvas</span>
      <span class="tag ready">ready</span>
    </a>
    <a href="./experiments/visualizer/">
      <span class="num">02</span>
      <span class="label">Music-Reactive Visualizer</span>
      <span class="tag ready">ready</span>
    </a>
    <a href="./experiments/dashboard/">
      <span class="num">03</span>
      <span class="label">Interactive Dashboard</span>
      <span class="tag ready">ready</span>
    </a>
    <a href="./experiments/geometry/">
      <span class="num">04</span>
      <span class="label">Projection-Mapped Geometry</span>
      <span class="tag ready">ready</span>
    </a>
    <a href="./experiments/motion/">
      <span class="num">05</span>
      <span class="label">Motion-Reactive Wall</span>
      <span class="tag ready">ready</span>
    </a>
    <a href="./experiments/immersive/">
      <span class="num">06</span>
      <span class="label">Immersive Room Transform</span>
      <span class="tag ready">ready</span>
    </a>
  </div>
</body>
</html>

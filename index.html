<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Interactive projection mapping experiments — drawing, generative art, motion & audio visuals." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Projection Lab" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
  <title>Projection Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { overscroll-behavior: none; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: max(2.5rem, env(safe-area-inset-top)) 1rem max(2.5rem, env(safe-area-inset-bottom));
    }
    h1 {
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin: 1rem 0 2rem;
      color: #fff;
      text-align: center;
    }
    .section-label {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin: 2.5rem 0 0.75rem;
      align-self: flex-start;
      padding-left: 0.25rem;
    }
    .experiments {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 520px;
    }
    a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      min-height: 60px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #ccc;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      touch-action: manipulation;
    }
    a:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.99); }
    @media (hover: hover) {
      a:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        color: #fff;
        transform: translateX(4px);
      }
    }
    .num {
      font-size: 0.75rem;
      color: #555;
      min-width: 1.5rem;
    }
    .label { font-size: 1rem; font-weight: 400; flex: 1; }
    .tag {
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .tag.ready { background: rgba(80, 200, 120, 0.15); color: #50c878; }
    .tag.soon { background: rgba(255, 200, 50, 0.1); color: #666; }
    .max-wrap { width: 100%; max-width: 520px; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <h1>Projection Lab</h1>
  <div class="max-wrap">
    <div class="section-label">Experiments</div>
    <div class="experiments">
      <a href="./experiments/art/">
        <span class="num">01</span>
        <span class="label">Generative Art Canvas</span>
        <span class="tag ready">ready</span>
      </a>
      <a href="./experiments/visualizer/">
        <span class="num">02</span>
        <span class="label">Music-Reactive Visualizer</span>
        <span class="tag ready">ready</span>
      </a>
      <a href="./experiments/dashboard/">
        <span class="num">03</span>
        <span class="label">Interactive Dashboard</span>
        <span class="tag ready">ready</span>
      </a>
      <a href="./experiments/geometry/">
        <span class="num">04</span>
        <span class="label">Projection-Mapped Geometry</span>
        <span class="tag ready">ready</span>
      </a>
      <a href="./experiments/motion/">
        <span class="num">05</span>
        <span class="label">Motion-Reactive Wall</span>
        <span class="tag ready">ready</span>
      </a>
      <a href="./experiments/immersive/">
        <span class="num">06</span>
        <span class="label">Immersive Room Transform</span>
        <span class="tag ready">ready</span>
      </a>
    </div>

    <div class="section-label">Tools</div>
    <div class="experiments">
      <a href="./experiments/mapper/">
        <span class="num">T1</span>
        <span class="label">Projection Mapper</span>
        <span class="tag ready">ready</span>
      </a>
    </div>
  </div>

  <script type="module" src="./landing.js"></script>
</body>
</html>
